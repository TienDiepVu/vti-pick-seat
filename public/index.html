<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Booking Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/app.css">
    <link rel="icon" type="image/png" href="./assets/logo.png">
  </head>
  <body class="monitoring-page">
    <main class="monitoring-wrap step-view" id="main-app">
      <!-- Step 1: List -->
      <section class="monitoring-card step-section active" id="step-list">
        <div class="monitoring-header">
          <div style="display: flex; justify-content: flex-start;">
            <button class="btn-action btn-green inter-font" type="button" id="btn-create-reg" style="height: 42px; font-size: 15px; padding: 0 28px; min-width: 180px;">+ Thêm đăng ký</button>
          </div>
          <h1 class="monitoring-title inter-font">DANH SÁCH CBNV ĐĂNG KÝ XEM PHIM</h1>
          <div style="display: flex; justify-content: flex-end;">
            <button class="btn-action btn-excel inter-font" type="button" id="btn-export-excel" style="height: 42px; font-size: 15px; padding: 0 28px; min-width: 180px;">⬇ Tải Excel</button>
          </div>
        </div>
        <div class="monitoring-toolbar">
          <input class="monitoring-search" id="search-input" type="text" placeholder="Tìm theo tên, account...">
        </div>
        <div class="monitoring-table-wrap">
          <table class="monitoring-table">
            <thead>
              <tr class="inter-font">
                <th>STT</th>
                <th>CBNV đăng ký</th>
                <th>Account</th>
                <th>Đơn vị</th>
                <th>Số lượng</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
              </tr>
            </thead>
            <tbody id="list-body"></tbody>
          </table>
        </div>
      </section>

      <!-- Step 2: Confirm attendees -->
      <section class="stage step-section monitoring-card" id="step-confirm" style="--bg: url('/assets/cinema-bg.png')">
        <div class="confirm-content-wrapper" style="max-width: 700px; margin: auto; width: 100%;">
          <div class="confirm-content">
            <label class="confirm-label inter-font">
              Họ và tên CBNV đăng ký
              <input class="confirm-input inter-font" type="text" id="confirm-emp-name" disabled>
            </label>
            
            <div class="confirm-row-2">
              <label class="confirm-label inter-font">
                Account CBNV
                <input class="confirm-input inter-font" type="text" id="confirm-emp-account" disabled>
              </label>
              <label class="confirm-label inter-font">
                Đơn vị
                <input class="confirm-input inter-font" type="text" id="confirm-emp-unit" disabled>
              </label>
            </div>
            
            <div class="attendees-section" id="attendee-list">
               <!-- Checkboxes here -->
            </div>
          </div>
        </div>
        <div class="monitoring-header">
          <button class="monitoring-back inter-font" type="button" id="btn-back-step1">Trở về</button>
          <h1 class="monitoring-title inter-font">XÁC NHẬN NGƯỜI THAM GIA</h1>
          <button class="btn-action btn-next inter-font" type="button" id="btn-next-step3" style="justify-self: end; height: 42px; font-size: 16px; padding: 0 20px;">Tiếp tục chọn ghế</button>
        </div>
      </section>

      <!-- Step 3: Seating -->
      <section class="stage step-section" id="step-seats" style="--bg: url('/assets/cinema-bg.png')">
        <div class="fit cinema-1 custom-flow" aria-label="Cinema 1 seating layout" id="cinema-1-container">
          <div class="seating" data-seating></div>
          <div class="row-labels" data-labels aria-hidden="true"></div>

          <div class="legend" aria-label="Seat legend">
            <div class="legend-item inter-font"><span class="legend-swatch logo-seat"></span>Đã đặt</div>
            <div class="legend-item inter-font"><span class="legend-swatch couple"></span>Ghế đôi</div>
            <div class="legend-item inter-font"><span class="legend-swatch"></span>Còn trống</div>
            <div class="legend-item inter-font"><span class="legend-swatch current"></span>Đang chọn</div>
          </div>
        </div>

        <div class="monitoring-header" style="position: absolute; bottom: 0; left: 0; right: 0; z-index: 100;">
          <button class="monitoring-back inter-font" type="button" id="btn-back-step2">Trở về</button>
          <div style="display: flex; flex-direction: column; align-items: center;">
            <h1 class="cinema-title inter-font" style="position: static; font-size: 28px; color: #ffffff;">CHỌN GHẾ (<span class="seating-status inter-font" id="seating-status-text" style=" margin: 4px 0 0; color: #ffffff;"></span>)</h1>
          </div>
          <button class="btn-action btn-next inter-font" type="button" id="btn-confirm-seats" style="justify-self: end; height: 42px; font-size: 16px; padding: 0 20px;">Xác nhận đặt ghế</button>
        </div>
      </section>
    </main>

    <!-- Modal Tạo đăng ký mới -->
    <div class="custom-modal" id="create-reg-modal">
      <div class="custom-modal-content" style="max-width: 540px; width: 90%;">
        <h2 class="inter-font" style="color: #090083; text-align: center; font-size: 22px; margin: 0 0 20px;">THÊM NGƯỜI ĐĂNG KÝ</h2>
        <div style="display: flex; flex-direction: column; gap: 14px;">
          <label class="confirm-label inter-font" style="color: #13216a;">
            Họ và tên CBNV đăng ký <span style="color: #ff3838; margin-left: 4px;">*</span>
            <input class="confirm-input inter-font" type="text" id="new-reg-name" placeholder="Nhập họ và tên...">
            <div class="error-msg" id="err-new-reg-name" style="color: #ff3838; font-size: 13px; margin-top: 4px; display: none; font-weight: 500;"></div>
          </label>
          <div class="confirm-row-2">
            <label class="confirm-label inter-font" style="color: #13216a;">
              Account CBNV <span style="color: #ff3838; margin-left: 4px;">*</span>
              <input class="confirm-input inter-font" type="text" id="new-reg-account" placeholder="Nhập account...">
              <div class="error-msg" id="err-new-reg-account" style="color: #ff3838; font-size: 13px; margin-top: 4px; display: none; font-weight: 500;"></div>
            </label>
            <label class="confirm-label inter-font" style="color: #13216a;">
              Đơn vị <span style="color: #ff3838; margin-left: 4px;">*</span>
              <input class="confirm-input inter-font" type="text" id="new-reg-unit" placeholder="Nhập đơn vị...">
              <div class="error-msg" id="err-new-reg-unit" style="color: #ff3838; font-size: 13px; margin-top: 4px; display: none; font-weight: 500;"></div>
            </label>
          </div>
          <div id="new-reg-relatives-wrap" style="display: flex; flex-direction: column; gap: 10px;">
            <label class="confirm-label inter-font" style="color: #13216a;">Người xem (tối đa 3, tối thiểu 1) <span style="color: #ff3838; margin-left: 4px;">*</span></label>
            <input class="confirm-input inter-font" type="text" data-relative="0" placeholder="Người xem 1 (Bắt buộc)">
            <input class="confirm-input inter-font" type="text" data-relative="1" placeholder="Người xem 2 (để trống nếu không có)">
            <input class="confirm-input inter-font" type="text" data-relative="2" placeholder="Người xem 3 (để trống nếu không có)">
            <div class="error-msg" id="err-new-reg-relatives" style="color: #ff3838; font-size: 13px; margin-top: 4px; display: none; font-weight: 500;"></div>
          </div>
        </div>
        <div class="custom-modal-actions" style="margin-top: 24px;">
          <button class="btn-action btn-cancel inter-font" id="create-reg-cancel">Hủy</button>
          <button class="btn-action btn-next inter-font" id="create-reg-ok">Tạo đăng ký</button>
        </div>
      </div>
    </div>

    <!-- Custom Alert/Confirm Modal -->
    <div class="custom-modal" id="custom-modal">
      <div class="custom-modal-content">
        <div id="custom-modal-message" class="inter-font" style="margin-bottom: 20px;"></div>
        <div class="custom-modal-actions">
          <button class="btn-action btn-cancel inter-font" id="custom-modal-cancel">Hủy</button>
          <button class="btn-action btn-next inter-font" id="custom-modal-ok">Xác nhận</button>
        </div>
      </div>
    </div>

    <script src="./js/seating.js"></script>
    <script src="./js/index.js"></script>
  </body>
</html>
