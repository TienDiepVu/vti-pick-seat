<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sơ đồ chỗ ngồi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/app.css">
    <link rel="icon" type="image/png" href="./assets/logo.png">
  </head>
  <body>
    <main class="stage" style="--bg: url('/assets/cinema-bg.png')">
      <section class="fit cinema view-only" aria-label="Cinema seating layout">        <div class="seating" data-seating></div>
        <div class="row-labels" data-labels aria-hidden="true"></div>

        <div class="legend" aria-label="Seat legend">
          <div class="legend-item inter-font"><span class="legend-swatch logo-seat"></span>Đã đặt</div>
          <div class="legend-item inter-font"><span class="legend-swatch couple"></span>Ghế đôi</div>
          <div class="legend-item inter-font"><span class="legend-swatch"></span>Còn trống</div>
        </div>
      </section>

      <div class="view-footer">
        <marquee class="view-message inter-font" behavior="scroll" direction="left" scrollamount="6">
          Chào mừng CBNV VTI đến trải nghiệm xem phim Doraemon: Nobita và lâu đài dưới đáy biển! &nbsp;&nbsp;&nbsp;&nbsp; Nhanh tay chọn cho mình 1 chỗ ngồi thật đẹp để theo dõi chuyến phiêu lưu của Doraemon và những người bạn nhé! &nbsp;&nbsp;&nbsp;&nbsp; 🎬🐟🎬
        </marquee>
      </div>
    </main>
    <script src="./js/seating.js"></script>
  </body>
</html>
